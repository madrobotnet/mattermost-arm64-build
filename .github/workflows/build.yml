name: Build and Publish Mattermost ARM64

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Mattermost version to build (e.g. 11.7.2). Leave empty to build the highest stable release."
        required: false
        type: string
  schedule:
    - cron: '23 2 * * *'
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/build.yml

permissions:
  contents: write
  packages: write

concurrency:
  group: mattermost-arm64-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Mattermost version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          normalize_version() {
            local raw="${1#v}"
            if [[ ! "$raw" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid Mattermost version: $1" >&2
              exit 1
            fi
            printf '%s\n' "$raw"
          }

          is_newer_version() {
            local candidate="$1"
            local current="$2"
            [ -z "$current" ] && return 0
            [ "$candidate" = "$current" ] && return 1
            [ "$(printf '%s\n%s\n' "$current" "$candidate" | sort -V | tail -n 1)" = "$candidate" ]
          }

          detect_highest_stable_version() {
            gh api --paginate 'repos/mattermost/mattermost/releases?per_page=100' \
              --jq '.[] | select(.draft == false and .prerelease == false and (.tag_name | test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))) | .tag_name' \
              | sed 's/^v//' \
              | sort -V \
              | tail -n 1
          }

          CURRENT_VERSION=""
          if [ -f VERSION ]; then
            CURRENT_VERSION_RAW="$(tr -d '[:space:]' < VERSION)"
            if [ -n "$CURRENT_VERSION_RAW" ]; then
              CURRENT_VERSION="$(normalize_version "$CURRENT_VERSION_RAW")"
            fi
          fi

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$(normalize_version "$INPUT_VERSION")"
            SHOULD_BUILD="true"
            REASON="manual version override"
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$CURRENT_VERSION" ]; then
            VERSION="$CURRENT_VERSION"
            SHOULD_BUILD="true"
            REASON="build definition changed; rebuilding recorded stable release $VERSION"
          else
            DETECTED_VERSION="$(detect_highest_stable_version)"
            VERSION="$(normalize_version "$DETECTED_VERSION")"

            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              SHOULD_BUILD="true"
              REASON="manual build of highest stable upstream release $VERSION"
            elif is_newer_version "$VERSION" "$CURRENT_VERSION"; then
              SHOULD_BUILD="true"
              if [ -n "$CURRENT_VERSION" ]; then
                REASON="highest stable upstream release increased: $CURRENT_VERSION -> $VERSION"
              else
                REASON="no recorded version; building highest stable upstream release $VERSION"
              fi
            else
              SHOULD_BUILD="false"
              REASON="highest stable upstream release ($VERSION) is not newer than recorded version ($CURRENT_VERSION)"
            fi
          fi

          test -n "$VERSION"
          MAJOR="${VERSION%%.*}"
          MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
          TARBALL_URL="https://releases.mattermost.com/${VERSION}/mattermost-team-${VERSION}-linux-arm64.tar.gz"
          IMAGE="ghcr.io/${{ github.repository }}"

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "tarball_url=$TARBALL_URL" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Verify upstream tarball exists
        if: steps.version.outputs.should_build == 'true'
        shell: bash
        run: |
          curl -I -fsSL "${{ steps.version.outputs.tarball_url }}" >/dev/null

      - name: Set up QEMU
        if: steps.version.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.version.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.version.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        if: steps.version.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Mattermost Team Edition ARM64 Build
            org.opencontainers.image.description=ARM64 Mattermost Team Edition image built from official Mattermost releases
            org.opencontainers.image.vendor=madrobotnet
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Build and push image
        if: steps.version.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          build-args: |
            MATTERMOST_VERSION=${{ steps.version.outputs.version }}
            MATTERMOST_TARBALL_URL=${{ steps.version.outputs.tarball_url }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Update VERSION marker
        if: steps.version.outputs.should_build == 'true' && steps.version.outputs.current_version != steps.version.outputs.version
        shell: bash
        run: |
          printf '%s\n' "${{ steps.version.outputs.version }}" > VERSION

      - name: Commit VERSION marker
        if: steps.version.outputs.should_build == 'true' && steps.version.outputs.current_version != steps.version.outputs.version
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: record upstream Mattermost ${{ steps.version.outputs.version }}"
          git push

      - name: Summary
        shell: bash
        run: |
          {
            echo '## Mattermost ARM64 build result'
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Decision: ${{ steps.version.outputs.should_build }}"
            echo "- Reason: ${{ steps.version.outputs.reason }}"
            echo "- Current recorded version: ${{ steps.version.outputs.current_version }}"
            echo "- Target version: ${{ steps.version.outputs.version }}"
            if [ "${{ steps.version.outputs.should_build }}" = "true" ]; then
              echo "- Tarball: ${{ steps.version.outputs.tarball_url }}"
              echo "- Image: \`${{ steps.version.outputs.image }}\`"
              echo "- Tags pushed: \`${{ steps.version.outputs.version }}\`, \`${{ steps.version.outputs.minor }}\`, \`${{ steps.version.outputs.major }}\`, \`latest\`"
            else
              echo '- Build skipped because no higher stable upstream release was detected.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
